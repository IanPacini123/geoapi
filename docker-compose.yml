services:
  db:
    image: postgres:15
    container_name: localidade_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-localidade}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - dev
    restart: unless-stopped

  api:
    build: .
    container_name: localidade_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-localidade}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379/0}
    restart: unless-stopped

  sync_job:
    build: .
    container_name: localidade_sync_job
    command: ["python", "cli/scheduler.py"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-localidade}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379/0}
    restart: unless-stopped

  cache:
    image: redis:alpine
    container_name: localidade_cache
    restart: unless-stopped
    profiles:
      - dev

volumes:
  postgres_data:

